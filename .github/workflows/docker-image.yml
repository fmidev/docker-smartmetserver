name: Docker Image CI

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# A new run on the same branch cancels a previous one still in flight.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      SHOULD_PUSH: ${{ github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) }}

    steps:
      - uses: actions/checkout@v6

      # --- Build (release and beta share the same Dockerfile) ---
      - name: Build release image
        run: docker build . --file Dockerfile --tag fmidev/smartmetserver:latest

      - name: Build beta image
        run: |
          docker build . --file Dockerfile \
            --build-arg SMARTMET_BETA_REPO_RPM=https://download.fmi.fi/smartmet-open/rhel/9/x86_64/smartmet-open-beta-latest-9.noarch.rpm \
            --tag fmidev/smartmetserver:beta

      # --- Test (sequential; each stops its container before the next binds 8080) ---
      - name: Test release image
        run: |
          docker run --name test-release --rm -p 127.0.0.1:8080:8080 \
            fmidev/smartmetserver:latest &> debug.log &
          sleep 45
          cat debug.log
          docker logs test-release
          curl -f "http://localhost:8080/wms?request=getCapabilities&service=WMS" \
            || exit 1
          docker stop test-release

      - name: Test beta image
        run: |
          docker run --name test-beta --rm -p 127.0.0.1:8080:8080 \
            fmidev/smartmetserver:beta &> debug-beta.log &
          sleep 45
          cat debug-beta.log
          docker logs test-beta
          curl -f "http://localhost:8080/wms?request=getCapabilities&service=WMS" \
            || exit 1
          docker stop test-beta

      # --- Tag ---
      - name: Tag images
        if: env.SHOULD_PUSH == 'true'
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            RELEASE_DATE_TAG=$(date +%y.%m.%d -d @"$(docker run --rm \
              fmidev/smartmetserver:latest rpm -qa \
              --queryformat %'{buildtime}\n' smartmet-*|sort -n|tail -1)")
            BETA_DATE_TAG=$(date +%y.%m.%d -d @"$(docker run --rm \
              fmidev/smartmetserver:beta rpm -qa \
              --queryformat %'{buildtime}\n' smartmet-*|sort -n|tail -1)")
          else
            RELEASE_DATE_TAG=$(date +%y.%m.%d)
            BETA_DATE_TAG=$(date +%y.%m.%d)
          fi
          echo "RELEASE_DATE_TAG=$RELEASE_DATE_TAG" >> "$GITHUB_ENV"
          echo "BETA_DATE_TAG=$BETA_DATE_TAG" >> "$GITHUB_ENV"

          # release
          docker image tag fmidev/smartmetserver:latest "fmidev/smartmetserver:${RELEASE_DATE_TAG}"
          docker image tag fmidev/smartmetserver:latest ghcr.io/fmidev/smartmetserver:latest
          docker image tag fmidev/smartmetserver:latest "ghcr.io/fmidev/smartmetserver:${RELEASE_DATE_TAG}"
          # beta
          docker image tag fmidev/smartmetserver:beta "fmidev/smartmetserver:beta-${BETA_DATE_TAG}"
          docker image tag fmidev/smartmetserver:beta ghcr.io/fmidev/smartmetserver:beta
          docker image tag fmidev/smartmetserver:beta "ghcr.io/fmidev/smartmetserver:beta-${BETA_DATE_TAG}"

      # --- Login ---
      - name: Login to Docker Hub
        if: env.SHOULD_PUSH == 'true'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
            docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      - name: Login to GitHub Container Registry
        if: env.SHOULD_PUSH == 'true'
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # --- Push: beta first, release last, so the release version stays on
      #     top of the GHCR package page (GHCR orders by publish time). ---
      - name: Push beta images
        if: env.SHOULD_PUSH == 'true'
        run: |
          docker push "fmidev/smartmetserver:beta"
          docker push "fmidev/smartmetserver:beta-${BETA_DATE_TAG}"
          docker push "ghcr.io/fmidev/smartmetserver:beta"
          docker push "ghcr.io/fmidev/smartmetserver:beta-${BETA_DATE_TAG}"

      - name: Push release images
        if: env.SHOULD_PUSH == 'true'
        run: |
          docker push "fmidev/smartmetserver:${RELEASE_DATE_TAG}"
          docker push "fmidev/smartmetserver:latest"
          docker push "ghcr.io/fmidev/smartmetserver:${RELEASE_DATE_TAG}"
          docker push "ghcr.io/fmidev/smartmetserver:latest"
