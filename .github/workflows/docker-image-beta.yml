name: Docker Image CI (Beta)

on:
  schedule:
    - cron: '0 6 * * *'
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-test-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      SHOULD_PUSH: ${{ github.event_name == 'schedule' || (github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')) }}

    steps:
      - uses: actions/checkout@v6

      - name: Docker build
        run: |
          docker build . --file Dockerfile \
            --build-arg SMARTMET_BETA_REPO_RPM=https://download.fmi.fi/smartmet-open/rhel/9/x86_64/smartmet-open-beta-latest-9.noarch.rpm \
            --tag fmidev/smartmetserver:beta

      - name: Docker test
        run: |
          docker run --name test --rm -p 127.0.0.1:8080:8080 \
            fmidev/smartmetserver:beta &> debug.log &
          sleep 45
          cat debug.log
          docker logs test
          curl -f "http://localhost:8080/wms?request=getCapabilities&service=WMS" \
            || exit 1
          docker stop test

      - name: Docker tag
        if: env.SHOULD_PUSH == 'true'
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            DATE_TAG=$(date +%y.%m.%d -d @"$(docker run --rm \
              fmidev/smartmetserver:beta rpm -qa \
              --queryformat %'{buildtime}\n' smartmet-*|sort -n|tail -1)")
          else
            DATE_TAG=$(date +%y.%m.%d)
          fi
          docker image tag fmidev/smartmetserver:beta \
            "fmidev/smartmetserver:beta-${DATE_TAG}"

      - name: Login to Docker Hub
        if: env.SHOULD_PUSH == 'true'
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | \
            docker login -u ${{ secrets.DOCKER_USER }} --password-stdin

      - name: Push to Docker Hub
        if: env.SHOULD_PUSH == 'true'
        run: docker push --all-tags fmidev/smartmetserver
